<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Spacecrafts Dashboard</title>
    <style>
        /* Background image and overall page styling */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('static/images/spacecraft.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: #fff;
            backdrop-filter: brightness(0.7);
        }

        /* Container to add a subtle dark overlay */
        .container {
            background-color: rgba(0, 0, 0, 0.6);
            margin: 40px auto;
            max-width: 1100px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #007bff;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            padding: 10px 15px;
            margin: 8px 10px 8px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            outline: none;
            width: 180px;
            background-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            transition: background-color 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus {
            background-color: rgba(255, 255, 255, 0.3);
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }

        /* Transparent table with blur effect */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(255, 255, 255, 0.1); /* very transparent */
            color: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        thead {
            background-color: rgba(0, 123, 255, 0.7);
            color: white;
        }

        th, td {
            padding: 14px 18px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        tbody tr:hover {
            background-color: rgba(0, 123, 255, 0.3);
            cursor: pointer;
        }

        /* Action buttons style */
        tbody button {
            padding: 6px 12px;
            margin: 0 4px;
            font-size: 14px;
            border-radius: 6px;
        }

        /* Responsive form layout */
        form {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }
    </style>

    <script>
        async function fetchSpacecrafts() {
            const res = await fetch('/spacecrafts');
            const spacecrafts = await res.json();
            const tbody = document.getElementById('spacecraft-body');
            tbody.innerHTML = '';
            spacecrafts.forEach(sc => {
                const row = `
                    <tr>
                        <td>${sc.spacecraft_id}</td>
                        <td>${sc.name}</td>
                        <td>${sc.type || ''}</td>
                        <td>${sc.manufacturer || ''}</td>
                        <td>${sc.first_flight ? new Date(sc.first_flight).toISOString().split('T')[0] : ''}</td>
                        <td>${sc.capacity || ''}</td>
                        <td>
                            <button onclick='editSpacecraft(${JSON.stringify(sc)})'>✏️</button>
                            <button onclick='deleteSpacecraft(${sc.spacecraft_id})'>🗑️</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        async function addOrUpdateSpacecraft() {
            const id = document.getElementById('spacecraft_id').value;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/spacecrafts/${id}` : '/spacecrafts';

            const data = {
                name: document.getElementById('name').value,
                type: document.getElementById('type').value,
                manufacturer: document.getElementById('manufacturer').value,
                first_flight: document.getElementById('first_flight').value,
                capacity: parseInt(document.getElementById('capacity').value) || null
            };

            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            document.getElementById('spacecraft-form').reset();
            document.getElementById('spacecraft_id').value = '';
            fetchSpacecrafts();
        }

        function editSpacecraft(sc) {
            document.getElementById('spacecraft_id').value = sc.spacecraft_id;
            document.getElementById('name').value = sc.name;
            document.getElementById('type').value = sc.type || '';
            document.getElementById('manufacturer').value = sc.manufacturer || '';
            document.getElementById('first_flight').value = sc.first_flight ? new Date(sc.first_flight).toISOString().split('T')[0] : '';
            document.getElementById('capacity').value = sc.capacity || '';
        }

        async function deleteSpacecraft(id) {
            if (!confirm('Are you sure?')) return;
            await fetch(`/spacecrafts/${id}`, { method: 'DELETE' });
            fetchSpacecrafts();
        }

        async function searchSpacecrafts() {
            const query = document.getElementById('search').value;
            const res = await fetch(`/spacecrafts/search?q=${encodeURIComponent(query)}`);
            const spacecrafts = await res.json();
            const tbody = document.getElementById('spacecraft-body');
            tbody.innerHTML = '';
            spacecrafts.forEach(sc => {
                const row = `
                    <tr>
                        <td>${sc.spacecraft_id}</td>
                        <td>${sc.name}</td>
                        <td>${sc.type || ''}</td>
                        <td>${sc.manufacturer || ''}</td>
                        <td>${sc.first_flight ? new Date(sc.first_flight).toISOString().split('T')[0] : ''}</td>
                        <td>${sc.capacity || ''}</td>
                        <td>
                            <button onclick='editSpacecraft(${JSON.stringify(sc)})'>✏️</button>
                            <button onclick='deleteSpacecraft(${sc.spacecraft_id})'>🗑️</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        window.onload = fetchSpacecrafts;
    </script>
</head>
<body>
    <div class="container">
        <h1>Spacecrafts Dashboard</h1>

        <input type="text" id="search" placeholder="Search by name..." oninput="searchSpacecrafts()" />
        <br><br>

        <form id="spacecraft-form" onsubmit="event.preventDefault(); addOrUpdateSpacecraft();">
            <input type="hidden" id="spacecraft_id">
            <input type="text" id="name" placeholder="Name" required>
            <input type="text" id="type" placeholder="Type">
            <input type="text" id="manufacturer" placeholder="Manufacturer">
            <input type="date" id="first_flight" placeholder="First Flight">
            <input type="number" id="capacity" placeholder="Capacity" min="0">
            <button type="submit">Save</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th><th>Name</th><th>Type</th><th>Manufacturer</th><th>First Flight</th><th>Capacity</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="spacecraft-body"></tbody>
        </table>
    </div>
</body>
</html>
