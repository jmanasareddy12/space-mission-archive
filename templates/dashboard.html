<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Space Missions Dashboard</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            padding: 20px;
            background: #0b1624;
            color: #e0e6f0;
        }
        .card {
            background-color: #14233c;
            border: none;
        }
        .card h5 {
            color: #aad8ff;
        }
        table {
            background: #1c2a48;
        }
        thead {
            background-color: #0f1c33;
        }
        a {
            color: #80bfff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .status-success {
            color: #4caf50;
            font-weight: 600;
        }
        .status-failure {
            color: #e53935;
            font-weight: 600;
        }
        .status-ongoing {
            color: #ffb300;
            font-weight: 600;
        }
        .status-planned {
            color: #64b5f6;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1 class="mb-4">🚀 Space Missions Dashboard</h1>

    <!-- Summary Cards -->
    <div class="row mb-4">
        <div class="col-md-3 col-sm-6 mb-3">
            <div class="card p-3 text-center">
                <h5>Agencies</h5>
                <div id="total-agencies" class="display-5">...</div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-3">
            <div class="card p-3 text-center">
                <h5>Missions</h5>
                <div id="total-missions" class="display-5">...</div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-3">
            <div class="card p-3 text-center">
                <h5>Astronauts</h5>
                <div id="total-astronauts" class="display-5">...</div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-3">
            <div class="card p-3 text-center">
                <h5>Spacecrafts</h5>
                <div id="total-spacecrafts" class="display-5">...</div>
            </div>
        </div>
    </div>

    <!-- Recent Missions Table -->
    <h3 class="mb-3">Recent Missions</h3>
    <div class="table-responsive">
        <table class="table table-striped table-hover text-light">
            <thead>
                <tr>
                    <th>Mission Name</th>
                    <th>Launch Date</th>
                    <th>Agency</th>
                    <th>Spacecraft</th>
                    <th>Destination</th>
                    <th>Status</th>
                    <th>Type</th>
                </tr>
            </thead>
            <tbody id="missions-table-body">
                <!-- dynamically filled -->
            </tbody>
        </table>
    </div>

    <!-- JavaScript to fetch and populate data -->
    <script>
        async function fetchDashboardData() {
            try {
                // Example endpoints; you must create these in your backend to serve JSON data
                const [agenciesRes, missionsRes, astronautsRes, spacecraftsRes] = await Promise.all([
                    fetch('/api/agencies/count'),
                    fetch('/api/missions/recent'),
                    fetch('/api/astronauts/count'),
                    fetch('/api/spacecrafts/count'),
                ]);

                const totalAgencies = await agenciesRes.json();
                const recentMissions = await missionsRes.json();
                const totalAstronauts = await astronautsRes.json();
                const totalSpacecrafts = await spacecraftsRes.json();

                // Update summary cards
                document.getElementById('total-agencies').textContent = totalAgencies.count ?? '0';
                document.getElementById('total-missions').textContent = recentMissions.totalCount ?? recentMissions.length ?? '0';
                document.getElementById('total-astronauts').textContent = totalAstronauts.count ?? '0';
                document.getElementById('total-spacecrafts').textContent = totalSpacecrafts.count ?? '0';

                // Populate recent missions table
                const tbody = document.getElementById('missions-table-body');
                tbody.innerHTML = '';

                recentMissions.missions?.forEach(mission => {
                    const tr = document.createElement('tr');

                    tr.innerHTML = `
                        <td>${mission.name}</td>
                        <td>${new Date(mission.launch_date).toLocaleDateString()}</td>
                        <td><a href="${mission.agency_website}" target="_blank" rel="noopener">${mission.agency_name}</a></td>
                        <td>${mission.spacecraft_name}</td>
                        <td>${mission.destination_name}</td>
                        <td class="status-${mission.mission_status.toLowerCase()}">${mission.mission_status}</td>
                        <td>${mission.mission_type}</td>
                    `;

                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error('Failed to fetch dashboard data:', err);
            }
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
